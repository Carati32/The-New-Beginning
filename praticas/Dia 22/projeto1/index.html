<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="caixa">

        <header>
            <h1>Adivinhe o número</h1>
            <p>Pensei em um número de 1 a 100</p>
        </header>
        <main>
            <label for="palpite">Seu palpite</label>
            <input type="number" id="palpite" placeholder="Digite um número...">
            <button onclick="chutar()">Chutar</button>
            <div class="res"></div>
            
            
        </main>
        <footer>
            <p id="tentativa">Tentativas: 0</p>
            <button onclick="resetar()">Reiniciar</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
