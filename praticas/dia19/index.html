<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Game Library</h1>
    </header>

    <main>
        <div class="filtro">
            <button class="button_todos">Todos</button>
            <button class="button_acao">Ação</button>
            <button class="button_rpg">RPG</button>
            <button class="button_aventura">Aventura</button>
        </div>
        <div class="cards">
            <div class="card genero_acao">
                <div >
                    <img src="images/Battlefield_1_capa.png" alt="Capa do Battlefield 1">
                    <h3>Battlefield 1</h3>
                    <p>Gênero:ação</p>
                    <p>Nota: #</p>
                </div>
            </div>
            <div class="card genero_acao">
                <div >
                    <img src="images/uncharted.png" alt="Capa do Uncharted">
                    <h3>Uncharted</h3>
                    <p>Gênero:ação</p>
                    <p>Nota: #</p>
                </div>
            </div>
            <div class="card genero_rpg">
                <div >
                    <img src="images/Skyrim.png" alt="Capa do Skyrim">
                    <h3>Skyrim</h3>
                    <p>Gênero:RPG</p>
                    <p>Nota: #</p>
                </div>
            </div>
            <div class="card genero_rpg"  >
                <div>
                    <img src="images/star-wars.png" alt="Capa do Star Wars">
                    <h3>Star Wars</h3>
                    <p>Gênero:RPG</p>
                    <p>Nota: #</p>
                </div>
            </div>
            <div class="card genero_aventura">
                <div>
                    <img src="images/Minecraft.png" alt="Capa do Minecraft">
                    <h3>Minecraft</h3>
                    <p>Gênero:Aventura</p>
                    <p>Nota: #</p>
                </div>
            </div>
            <div class="card genero_aventura"  > 
                <div>
                    <img src="images/the-witcher.png" alt="Capa do The Witcher">
                    <h3>The Witcher</h3>
                    <p>Gênero:Aventura</p>
                    <p>Nota: #</p>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>

</html>
