<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout de card de perfil</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Layout de card de perfil: Construa um card de perfil usando grid: avatar à esquerda, nome e bio à direita. Use grid-template-areas para nomear as regiões. -->
    <div class="card">
        <div class="item avatar"><img src="images/Minha foto.jpg" alt="Foto de Carati"></div>
        <div class="item nome">Carati</div>
        <div class="item bio">Futuro Full-Stack</div>
    </div>
</body>
</html>
