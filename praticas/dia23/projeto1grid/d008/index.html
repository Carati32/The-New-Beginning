<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid responsivo automático</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Grid responsivo automático:Crie um grid de cards que se ajusta sozinho — em tela grande mostra 4 colunas, em tela pequena empilha tudo. Use repeat() com auto-fit e minmax(), sem media query. -->
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
        <div class="item">7</div>
        <div class="item">8</div>
    </div>
</body>
</html>
