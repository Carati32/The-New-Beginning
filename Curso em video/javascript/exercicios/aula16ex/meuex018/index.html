<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <p>Número(entre 1 e 100): <input type="number" id="number" name="number"> <input type="button" value="Adicionar" id="adicionar" onclick="adicionar()"></p>
        <div class="select">
            <select name="arraynumbers" id="selectnumber" size="10"></select>
            <input type="button" value="Finalizar" onclick="finalizar()">
        </div>
        <div class="res"></div>
    </section>
    <footer>
        <p>&copy;CursoemVídeo</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
