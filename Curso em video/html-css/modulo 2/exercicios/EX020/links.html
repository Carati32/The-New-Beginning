<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
    <style>
        /* SELRETORES PERSONALIZADOS
           # = id
           . = class
           : = pseudo-class
           :: = pseudo-elemet
           > = clildren
        */


        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited{
            color: darkred;
        }

        a:hover{
            color: black;
            text-decoration: underline;
        }

        a:active{
            color: yellow;
        }

        .especial{
            background-color: red;
        }

        .especial::before {
            content: '\21D2';
        }

        .especial::after{
            content: '\21D0';
        }
    </style>
</head>
<body>
    <h1>Personalizando Links</h1>

    <ul>
        <li><a href="#" target="_blank">Repositório GitHub</a></li>
        <li><a href="#" class="especial">Canal do Youtube</a></li>
        <li><a href="#" class="especial">Site do CursoemVideo</a></li>
    </ul>
</body>
</html>
